name: login - happy path
description: |
  Fill in credentials, submit the login form, and verify
  the user lands on the dashboard.
baseUrl: ${BASE_URL:-https://example.com}
browser: chromium
timeout: 15000
retries: 1
tags:
  - auth
  - smoke
env:
  EMAIL: ${TEST_EMAIL:-user@example.com}
  PASSWORD: ${TEST_PASSWORD:-secret}

steps:
  - navigate: /login
  - assertVisible:
      role: heading
      name: Sign In
  - fill:
      label: Email
      value: ${EMAIL}
  - fill:
      label: Password
      value: ${PASSWORD}
  - click:
      role: button
      name: Sign In
  - waitForUrl: /dashboard
  - assertVisible:
      role: heading
      name: Dashboard
  - log: "Login succeeded."
